<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        h1, h2 { text-align: center; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 15px; text-align: center; transition: transform 0.2s; }
        .card:hover { border-color: #007bff; }
        .card img { width: 100%; border-radius: 6px; cursor: pointer; background: #000; min-height: 150px; }
        .controls { margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        button { background: #333; color: #fff; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        button:hover { background: #007bff; border-color: #007bff; }
        .danger { background: #821c25; }
        .danger:hover { background: #dc3545; }
        .camera-btn { background: #1e5631; }
        .camera-btn:hover { background: #28a745; }
        .input-group { margin-top: 15px; display: flex; gap: 5px; }
        input { flex-grow: 1; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #121212; color: #fff; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 9999; }
        #modal img { max-width: 95%; max-height: 90%; border: 2px solid #333; }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 3rem; cursor: pointer; color: #fff; }
    </style>
</head>
<body>

    <h1>🖥️ Workstation Monitoring Dashboard</h1>

    <div class="grid">
        {% for screen in screens %}
        {% set machine_id = screen.replace('.jpg', '') %}
        <div class="card">
            <h3>{{ machine_id }}</h3>
            <!-- We add a 'monitor-img' class here for the refresh script -->
            <img src="/monitors/{{ screen }}" class="monitor-img" data-machine="{{ machine_id }}" onclick="openFullscreen(this.src)">
            
            <div class="controls">
                <button onclick="sendCommand('{{ machine_id }}', 'lock')">🔒 Lock</button>
                <button class="danger" onclick="sendCommand('{{ machine_id }}', 'restrict')">⚠️ Restrict</button>
                <button onclick="sendCommand('{{ machine_id }}', 'unrestrict')">🔓 Unlock</button>
                <button class="camera-btn" onclick="sendCommand('{{ machine_id }}', 'camera_on')">📷 Camera</button>
            </div>
            
            <div class="input-group">
                <input type="text" id="type-{{ machine_id }}" placeholder="Type command...">
                <button onclick="typeText('{{ machine_id }}')">Send</button>
            </div>
        </div>
        {% endfor %}
    </div>

    <h2>📷 Active Camera Feeds</h2>
    <div class="grid">
        {% for cam in cams %}
        {% set machine_id = cam.replace('cam_', '').replace('.jpg', '') %}
        <div class="card">
            <h3>{{ machine_id }} (Cam)</h3>
            <img src="/monitors/{{ cam }}" class="monitor-img" onclick="openFullscreen(this.src)">
        </div>
        {% endfor %}
    </div>

    <div id="modal">
        <span class="close-btn" onclick="closeFullscreen()">&times;</span>
        <img id="modal-img" src="">
    </div>

    <script>
        function sendCommand(machineId, action) {
            fetch('/send_command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ machine_id: machineId, action: action })
            });
        }

        function typeText(machineId) {
            const input = document.getElementById(`type-${machineId}`);
            fetch('/send_command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ machine_id: machineId, action: 'type', text: input.value })
            });
            input.value = '';
        }

        function openFullscreen(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeFullscreen() {
            document.getElementById('modal').style.display = 'none';
        }

        // SMART REFRESH: Only reloads the images, not the whole page
        setInterval(() => {
            const images = document.querySelectorAll('.monitor-img');
            images.forEach(img => {
                const baseUrl = img.src.split('?')[0];
                // Append a timestamp to force the browser to bypass cache
                img.src = baseUrl + '?t=' + new Date().getTime();
            });
        }, 2000); // Refreshes images every 2 seconds
    </script>
</body>
</html>
